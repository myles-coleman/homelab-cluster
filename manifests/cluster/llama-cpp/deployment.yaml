apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
  namespace: llama-cpp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-cpp
  template:
    metadata:
      labels:
        app: llama-cpp
    spec:
      nodeSelector:
        gpu.node/type: amd-vulkan
      tolerations:
        - key: gpu
          operator: Equal
          value: amd
          effect: NoSchedule
      securityContext:
        fsGroup: 1001
      initContainers:
        - name: model-download
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              download_file() {
                url="$1"; filename="$2"
                if [ -f "/models/${filename}" ]; then
                  echo "Already exists: /models/${filename}, skipping"
                else
                  echo "Downloading ${filename}..."
                  if wget -O "/models/${filename}" "${url}"; then
                    echo "Download complete: ${filename}"
                  else
                    echo "Download failed: ${filename}"
                    rm -f "/models/${filename}"
                    exit 1
                  fi
                fi
              }
              download_file "${MODEL_URL}" "${MODEL_FILENAME}"
              if [ -n "${MMPROJ_URL}" ] && [ -n "${MMPROJ_FILENAME}" ]; then
                download_file "${MMPROJ_URL}" "${MMPROJ_FILENAME}"
              fi
          envFrom:
            - configMapRef:
                name: llama-cpp-config
          volumeMounts:
            - name: models
              mountPath: /models
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: llama-cpp
          image: beebecomebigbee/llama-cpp-vulkan:latest
          command:
            - sh
            - -c
            - |
              exec llama-server $LLAMA_ARGS -m /models/$MODEL_FILENAME
          envFrom:
            - configMapRef:
                name: llama-cpp-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
              gpu.cowlab.org/dri: 1
            limits:
              memory: "6Gi"
              cpu: "4000m"
              gpu.cowlab.org/dri: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/llama/.cache
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-models
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
