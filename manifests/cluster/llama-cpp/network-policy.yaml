apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-cpp
  namespace: llama-cpp
spec:
  podSelector:
    matchLabels:
      app: llama-cpp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS for HuggingFace model downloads
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
