apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-mcp
  namespace: argocd-mcp
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd-mcp.cowlab.org`)
      kind: Rule
      services:
        - name: argocd-mcp
          port: 3000
