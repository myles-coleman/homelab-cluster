apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-mcp
  namespace: argocd-mcp
spec:
  podSelector:
    matchLabels:
      app: argocd-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traefik ingress
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3000
    # Open WebUI MCP client
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: open-webui
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # ArgoCD API server (in-cluster)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
