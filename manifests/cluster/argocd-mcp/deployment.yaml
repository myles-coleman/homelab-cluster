apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-mcp
  namespace: argocd-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-mcp
  template:
    metadata:
      labels:
        app: argocd-mcp
    spec:
      containers:
      - name: argocd-mcp
        image: ghcr.io/argoproj-labs/mcp-for-argocd:latest
        env:
        - name: TZ
          value: "Etc/UTC"
        - name: ARGOCD_BASE_URL
          value: "https://argocd-server.argocd.svc.cluster.local"
        - name: ARGOCD_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: argocd-mcp-credentials
              key: api-token
        - name: MCP_READ_ONLY
          value: "true"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /mcp
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /mcp
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: tmp
        emptyDir: {}
