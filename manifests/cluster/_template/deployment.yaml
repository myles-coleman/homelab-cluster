apiVersion: apps/v1
kind: Deployment
metadata:
  name: CHANGEME
  namespace: CHANGEME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: CHANGEME
  template:
    metadata:
      labels:
        app: CHANGEME
    spec:
      containers:
      - name: CHANGEME
        image: CHANGEME
        env:
        - name: TZ
          value: "Etc/UTC"
        ports:
        - containerPort: CHANGEME
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
