apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        env:
        - name: TZ
          value: "Etc/UTC"
        - name: ENV
          value: "prod"
        # Disable Ollama, use OpenAI-compatible API (llama.cpp)
        - name: ENABLE_OLLAMA_API
          value: "False"
        - name: ENABLE_OPENAI_API
          value: "True"
        - name: OPENAI_API_BASE_URL
          value: "http://llama-cpp.llama-cpp.svc.cluster.local:8080/v1"
        - name: OPENAI_API_KEY
          value: "sk-placeholder"
        # Auth - first registered user becomes admin
        - name: WEBUI_AUTH
          value: "True"
        - name: WEBUI_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: open-webui-secrets
              key: secret-key
        - name: WEBUI_URL
          value: "https://openwebui.cowlab.org"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "2048Mi"
            cpu: "1000m"
          requests:
            memory: "1024Mi"
            cpu: "250m"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: data-volume
          mountPath: /app/backend/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: open-webui-data
