apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: open-webui
  namespace: open-webui
spec:
  podSelector:
    matchLabels:
      app: open-webui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traefik ingress
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # llama.cpp OpenAI-compatible API
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llama-cpp
      ports:
        - protocol: TCP
          port: 8080
    # ArgoCD MCP server
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd-mcp
      ports:
        - protocol: TCP
          port: 3000
    # HTTPS for external resources (model info, updates, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
