apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
      - name: searxng
        image: searxng/searxng:latest
        env:
        - name: TZ
          value: "Etc/UTC"
        - name: SEARXNG_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: searxng-secrets
              key: secret-key
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        volumeMounts:
        - name: config-volume
          mountPath: /etc/searxng
        - name: data-volume
          mountPath: /var/lib/searxng
      volumes:
      - name: config-volume
        configMap:
          name: searxng-config
      - name: data-volume
        persistentVolumeClaim:
          claimName: searxng-data
